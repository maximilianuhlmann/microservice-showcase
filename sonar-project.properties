# SonarQube Project Configuration
# This file is used by the SonarQube Maven plugin

# SonarQube Server URL
sonar.host.url=http://localhost:9000

# Note: No authentication token needed
# With SONAR_FORCEAUTHENTICATION=false, SonarQube works automatically
# Just run: make sonar-dev (or make sonar for production)

# Project Key (unique identifier for this project in SonarQube)
sonar.projectKey=usage-billing-service
sonar.projectName=Usage Billing Service
sonar.projectVersion=1.0.0

# Source Code Configuration
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Coverage Reports (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml

# Exclusions
sonar.exclusions=**/mapper/*MapperImpl.java,**/*$*Builder.java,**/*$*_.java
sonar.test.exclusions=**/mapper/*MapperImpl.java

