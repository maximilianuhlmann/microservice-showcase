# Application Configuration
spring.application.name=usage-billing-service
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:usagebillingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# H2 Console (for development) - Protected with basic auth
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Admin Authentication (for Togglz console and H2 console)
admin.username=admin
admin.password=admin123

# API Key Authentication (for REST API endpoints)
# Comma-separated list of valid API keys.
# Development: Use dev-api-key-123 for local testing
# Production: Set strong, unique API keys for each client service.
# Example: api.keys=dev-api-key-123,prod-key-abc,prod-key-xyz
api.keys=dev-api-key-123

# API Key Configuration
# Use database for API key to customer mapping (recommended for production)
api.key.use-database=true
# Fallback: config-based mapping (format: api-key-1=customer-1,api-key-2=customer-2)
api.key.customer.mapping=dev-api-key-123=customer-123

# Pricing Configuration
# All pricing rates are stored in the database (default_rates and pricing_rates tables)
# Default rates can be updated at runtime via database
# Customer-specific rates can be added/updated via database

# Billing Scheduler Configuration
# Enable scheduled billing calculation (runs on first day of month at midnight)
billing.scheduler.enabled=false
billing.scheduler.cron=0 0 1 * * ?

# Feature Flags (Togglz)
togglz.realtime-billing=false
togglz.usage-aggregation=true
togglz.invoice-generation=false
togglz.webhook-notifications=false
togglz.advanced-metrics=false

# Togglz Console (Admin UI) - Protected with basic auth
togglz.console.enabled=true
togglz.console.path=/togglz
togglz.console.secured=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.microservice.billing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

