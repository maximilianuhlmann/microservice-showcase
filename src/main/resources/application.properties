# Application Configuration
spring.application.name=usage-billing-service
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:usagebillingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# H2 Console (for development) - Protected with basic auth
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Admin Authentication (for Togglz console and H2 console)
admin.username=admin
admin.password=admin123

# Feature Flags (Togglz)
togglz.realtime-billing=false
togglz.usage-aggregation=true
togglz.invoice-generation=false
togglz.webhook-notifications=false
togglz.advanced-metrics=false

# Togglz Console (Admin UI) - Protected with basic auth
togglz.console.enabled=true
togglz.console.path=/togglz
togglz.console.secured=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.microservice.billing=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

