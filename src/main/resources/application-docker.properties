# Docker/Production Configuration
# This profile is used when running in Docker containers

# Application Configuration
spring.application.name=usage-billing-service
server.port=8080

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://postgres:5432/usagebillingdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:usagebilling}
spring.datasource.password=${DB_PASSWORD:usagebilling123}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# H2 Console (disabled in Docker - using PostgreSQL)
spring.h2.console.enabled=false

# Admin Authentication (for Togglz console)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# API Key Authentication
api.keys=${API_KEYS:dev-api-key-123}
api.key.use-database=true
api.key.customer.mapping=${API_KEY_MAPPING:dev-api-key-123=customer-123}

# Billing Scheduler Configuration
billing.scheduler.enabled=${BILLING_SCHEDULER_ENABLED:false}
billing.scheduler.cron=${BILLING_SCHEDULER_CRON:0 0 1 * * ?}

# Feature Flags (Togglz)
togglz.realtime-billing=false
togglz.usage-aggregation=true
togglz.invoice-generation=false
togglz.webhook-notifications=false
togglz.advanced-metrics=false

# Togglz Console (Admin UI) - Protected with basic auth
togglz.console.enabled=true
togglz.console.path=/togglz
togglz.console.secured=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.microservice.billing=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

spring.thymeleaf.check-template-location=false

