# Test Profile Configuration
# Database will be provided by Testcontainers (PostgreSQL)
# See PostgresTestContainer.java

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration (enabled for tests)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

logging.level.root=WARN
logging.level.com.microservice.billing=INFO

# Feature Flags for Testing
features.usage-aggregation-enabled=true

# Security Configuration for Tests (disabled)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

